# .pre-commit-config.yaml — автоматичний запуск лінтерів перед кожним комітом.
#
# Встановлення (один раз):
#   cd F:\Project\dnz52-react\backend
#   .\.venv\Scripts\pre-commit.exe install
#
# Або вручну для всього репо:
#   pre-commit run --all-files

repos:
  # ── Python: ruff (лінтер + isort) ───────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        name: "ruff (Python lint)"
        args: [--config=backend/ruff.toml]
        files: ^backend/.*\.py$

  # ── Python: black (форматер) ─────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        name: "black (Python format)"
        language_version: python3.11
        args: [--config=backend/black.toml]
        files: ^backend/.*\.py$

  # ── JavaScript/TypeScript: prettier ──────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: "prettier (JS/TS format)"
        files: ^frontend/src/.*\.(ts|tsx|css)$
        additional_dependencies:
          - prettier@3.4.2

  # ── Загальні перевірки ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: "trailing whitespace"
      - id: end-of-file-fixer
        name: "end of file fixer"
      - id: check-yaml
        name: "check YAML syntax"
      - id: check-merge-conflict
        name: "check merge conflicts"
      - id: check-added-large-files
        name: "check large files"
        args: [--maxkb=1024]
