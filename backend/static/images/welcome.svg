<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#A8D8F0"/>
            <stop offset="100%" stop-color="#E8F4FD"/>
        </linearGradient>
        <linearGradient id="houseGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFE9A0"/>
            <stop offset="100%" stop-color="#FFD166"/>
        </linearGradient>
        <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FF8FA3"/>
            <stop offset="100%" stop-color="#E5677E"/>
        </linearGradient>
        <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7DD87D"/>
            <stop offset="100%" stop-color="#4FB04F"/>
        </linearGradient>
    </defs>

    <!-- Sky -->
    <rect width="800" height="450" fill="url(#skyGrad)"/>

    <!-- Sun -->
    <circle cx="650" cy="110" r="55" fill="#FFD93D"/>
    <circle cx="650" cy="110" r="70" fill="#FFD93D" opacity="0.35"/>

    <!-- Clouds -->
    <g fill="#fff" opacity="0.95">
        <ellipse cx="140" cy="100" rx="55" ry="22"/>
        <ellipse cx="180" cy="90" rx="45" ry="20"/>
        <ellipse cx="110" cy="95" rx="38" ry="18"/>
    </g>
    <g fill="#fff" opacity="0.9">
        <ellipse cx="500" cy="160" rx="50" ry="20"/>
        <ellipse cx="540" cy="150" rx="42" ry="18"/>
        <ellipse cx="470" cy="155" rx="35" ry="16"/>
    </g>

    <!-- Grass -->
    <rect y="450" width="800" height="150" fill="url(#grassGrad)"/>

    <!-- House (kindergarten) -->
    <g>
        <!-- Roof -->
        <polygon points="220,260 400,160 580,260" fill="url(#roofGrad)"/>
        <polygon points="220,260 400,160 580,260 580,280 400,180 220,280" fill="#C94B62"/>
        <!-- Body -->
        <rect x="240" y="260" width="320" height="200" fill="url(#houseGrad)"/>
        <!-- Door -->
        <rect x="370" y="350" width="60" height="110" rx="8" fill="#7B4F2A"/>
        <circle cx="420" cy="405" r="3" fill="#FFD93D"/>
        <!-- Windows -->
        <g>
            <rect x="270" y="295" width="62" height="62" rx="6" fill="#A8D8F0" stroke="#fff" stroke-width="6"/>
            <line x1="301" y1="295" x2="301" y2="357" stroke="#fff" stroke-width="4"/>
            <line x1="270" y1="326" x2="332" y2="326" stroke="#fff" stroke-width="4"/>
        </g>
        <g>
            <rect x="468" y="295" width="62" height="62" rx="6" fill="#A8D8F0" stroke="#fff" stroke-width="6"/>
            <line x1="499" y1="295" x2="499" y2="357" stroke="#fff" stroke-width="4"/>
            <line x1="468" y1="326" x2="530" y2="326" stroke="#fff" stroke-width="4"/>
        </g>
        <!-- Sign -->
        <rect x="350" y="220" width="100" height="30" rx="6" fill="#fff" stroke="#4A90E2" stroke-width="3"/>
        <text x="400" y="241" font-family="Montserrat, sans-serif" font-size="16" font-weight="700" fill="#4A90E2" text-anchor="middle">ЗДО №52</text>
        <!-- Flag -->
        <line x1="400" y1="160" x2="400" y2="130" stroke="#7B4F2A" stroke-width="3"/>
        <polygon points="400,130 430,140 400,148" fill="#4A90E2"/>
    </g>

    <!-- Trees -->
    <g>
        <rect x="120" y="380" width="14" height="80" fill="#7B4F2A"/>
        <circle cx="127" cy="370" r="48" fill="#4FB04F"/>
        <circle cx="100" cy="375" r="32" fill="#5DC267"/>
        <circle cx="155" cy="375" r="32" fill="#5DC267"/>
    </g>
    <g>
        <rect x="660" y="395" width="14" height="65" fill="#7B4F2A"/>
        <circle cx="667" cy="385" r="42" fill="#4FB04F"/>
        <circle cx="645" cy="390" r="28" fill="#5DC267"/>
        <circle cx="690" cy="390" r="28" fill="#5DC267"/>
    </g>

    <!-- Children silhouettes -->
    <g>
        <!-- child 1 -->
        <circle cx="180" cy="490" r="14" fill="#FFB48F"/>
        <rect x="170" y="500" width="20" height="32" rx="6" fill="#4A90E2"/>
        <!-- child 2 -->
        <circle cx="220" cy="495" r="13" fill="#FFB48F"/>
        <rect x="211" y="504" width="18" height="30" rx="6" fill="#FF8FA3"/>
        <!-- child 3 -->
        <circle cx="600" cy="492" r="13" fill="#FFB48F"/>
        <rect x="591" y="501" width="18" height="32" rx="6" fill="#50E3C2"/>
    </g>

    <!-- Flowers -->
    <g>
        <circle cx="320" cy="510" r="6" fill="#FF8FA3"/>
        <circle cx="320" cy="510" r="2.5" fill="#FFD93D"/>
        <circle cx="460" cy="515" r="6" fill="#FFD93D"/>
        <circle cx="460" cy="515" r="2.5" fill="#FF8FA3"/>
        <circle cx="380" cy="520" r="6" fill="#B388FF"/>
        <circle cx="380" cy="520" r="2.5" fill="#FFD93D"/>
    </g>
</svg>
